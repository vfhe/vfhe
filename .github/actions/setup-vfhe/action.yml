# SPDX-License-Identifier: Apache-2.0
name: Set up VFHE
description: >
  Python, cached dev dependencies, and optionally the built extension: the
  preamble every VFHE CI job shares.

inputs:
  python-version:
    description: Python version to set up.
    required: false
    # Latest stable, for the single-version jobs (lint, coverage, sdist, ...).
    # pyright still checks against the 3.10 floor via pyrightconfig.json.
    default: "3.14"
  build:
    description: >
      "none" to skip building, "proto" for the generated bindings only, "full"
      for the native extension, "coverage" for a gcov-instrumented extension.
    required: false
    default: full

runs:
  using: composite
  steps:
    - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml

    # Unconditional: one cached dependency set for every job is simpler than
    # per-job subsets, at the cost of installing more than some jobs need.
    - name: Install dev dependencies
      shell: bash
      run: |
        python -m pip install --upgrade "pip>=25.1"
        pip install --group dev

    - name: Build
      shell: bash
      env:
        BUILD_MODE: ${{ inputs.build }}
      run: |
        case "$BUILD_MODE" in
          none)     echo "skipping build" ;;
          proto)    make proto ;;
          full)     make build ;;
          coverage) VFHE_COVERAGE=1 make build ;;
          *) echo "::error::unknown build mode '$BUILD_MODE'"; exit 1 ;;
        esac
