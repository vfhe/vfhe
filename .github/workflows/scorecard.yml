# SPDX-License-Identifier: Apache-2.0
#
# Scores the repository's supply-chain posture (OpenSSF Scorecard). Runs on a
# schedule because the checks change without the code changing.
name: Scorecard

on:
  # Re-scores when branch protection changes; it feeds the Branch-Protection check.
  branch_protection_rule:
  schedule:
    - cron: "0 5 * * 1"
  push:
    branches: [main]

# read-all, not contents:read: Scorecard inspects branch protection, workflow
# configuration, and other repository settings.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Run the Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload the raw results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
      - name: Send the results to code scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: results.sarif
