# SPDX-License-Identifier: Apache-2.0
#
# Continuous fuzzing on main: builds the harnesses via .clusterfuzzlite and
# fuzzes for an hour, pruning and persisting the corpus between runs. Replaces
# the DIY nightly job; the same libFuzzer engine, managed by ClusterFuzzLite.
name: CFLite Batch

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions: read-all

jobs:
  batch:
    name: Batch fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - name: Build the fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: c
      - name: Run the fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 3600
          mode: batch
          output-sarif: true
