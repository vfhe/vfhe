# SPDX-License-Identifier: Apache-2.0
#
# Manual, two targets:
#   testpypi  a release candidate, versioned from the `version` input.
#   pypi      the production release, versioned from the tag it is run against.
#
# A PyPI version number can never be reused, so the sdist job checks the artifact
# as hard as ci.yml does before anything is uploaded.
name: Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi
      version:
        description: "RC version for testpypi, e.g. 0.0.1rc1. Unused for pypi."
        required: false
        default: ""

permissions:
  contents: read

# Never cancel a publish, and never run two at once.
concurrency:
  group: release-${{ inputs.target }}
  cancel-in-progress: false

env:
  # pypi takes the version from the tag; testpypi from the input.
  SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VFHE: >-
    ${{ inputs.target == 'pypi' && github.ref_name || inputs.version }}

jobs:
  sdist:
    name: Build and verify the sdist
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Before checkout: catches a bad invocation without spending a runner on it.
      - name: Validate inputs
        env:
          TARGET: ${{ inputs.target }}
          VERSION: ${{ inputs.version }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [ "$TARGET" = "testpypi" ] && [ -z "$VERSION" ]; then
            echo "::error::target=testpypi needs a 'version' input (e.g. 0.0.1rc1)."; exit 1
          fi
          if [ "$TARGET" = "pypi" ] && [ "$REF_TYPE" != "tag" ]; then
            echo "::error::target=pypi must be run from a version tag (Use workflow from -> the tag)."; exit 1
          fi
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/setup-vfhe
        with:
          build: none

      - name: Build the sdist
        run: python -m build --sdist

      # The same checks ci.yml runs on every pull request.
      - name: Check the package metadata
        run: twine check --strict dist/*.tar.gz
      - name: Install the sdist into a clean venv (compiles)
        run: python scripts/check_install.py dist/*.tar.gz
      - name: Run the smoke tests against the install
        run: python scripts/run_smoke_tests.py --python .cache/install/venv/bin/python

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          # Transport between jobs only; the GitHub Release keeps the artifacts.
          retention-days: 7

  # Not the setup-vfhe composite, deliberately: the SBOM must describe the
  # package's runtime environment, and the composite would pull the dev group in.
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
      - name: Install the package into a clean venv
        run: |
          python -m venv package-env
          package-env/bin/pip install .
      - name: Generate SBOM from the package environment
        run: |
          python -m pip install --group sbom
          cyclonedx-py environment package-env/bin/python \
            --output-reproducible --output-format JSON --output-file vfhe-sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom
          path: vfhe-sbom.json
          if-no-files-found: error
          # Transport between jobs only; the GitHub Release keeps the artifacts.
          retention-days: 7

  publish-testpypi:
    name: Publish RC to TestPyPI
    needs: [sdist, sbom]
    if: inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: testpypi
      url: https://test.pypi.org/p/vfhe
    permissions:
      id-token: write
    steps:
      - name: Download the sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-sdist
          path: dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI and cut a GitHub Release
    needs: [sdist, sbom]
    if: inputs.target == 'pypi'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: pypi
      url: https://pypi.org/p/vfhe
    permissions:
      contents: write # create the GitHub Release
      id-token: write # Trusted Publishing
      attestations: write # sign the sdist provenance
    steps:
      - name: Download the sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist-sdist
          path: dist
      - name: Download the SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sbom
      # Verifiable with: gh attestation verify <sdist> --repo <owner>/<repo>
      - name: Attest the sdist build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.gz
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
      - name: Create the GitHub Release with artifacts, SBOM, and provenance
        env:
          GH_TOKEN: ${{ github.token }}
          # GH_REPO: gh's documented way to target a repo without a checkout.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          BUNDLE: ${{ steps.attest.outputs.bundle-path }}
        run: |
          cp "$BUNDLE" provenance.intoto.jsonl
          gh release create "$TAG" dist/*.tar.gz vfhe-sbom.json provenance.intoto.jsonl \
            --generate-notes --verify-tag
