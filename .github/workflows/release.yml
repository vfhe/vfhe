# SPDX-License-Identifier: Apache-2.0
name: Release

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and publish to PyPI (e.g. 0.0.1)"
        required: true

permissions:
  contents: read

env:
  SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VFHE: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}

# vfhe ships as an sdist only -- no wheels. Every install compiles from source
# and tunes to the target CPU (see native/build_ffi.py); the release therefore
# builds and publishes just the source distribution.
jobs:
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: pipx run build --sdist
      - name: Verify the C + BLAKE3 sources are inside the sdist
        run: |
          tar tzf dist/*.tar.gz | grep -q 'external/blake3/c/blake3.c' \
            || { echo "::error::sdist is missing BLAKE3 sources (submodule not checked out?)"; exit 1; }
          tar tzf dist/*.tar.gz | grep -q 'modules/arith/c/src/ntt.c' \
            || { echo "::error::sdist is missing the module C sources"; exit 1; }
      - uses: actions/upload-artifact@v7
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package + CycloneDX
        run: |
          python -m pip install --upgrade "pip>=25.1"
          python -m pip install . cyclonedx-bom
      - name: Generate SBOM from the installed environment
        run: cyclonedx-py environment --output-format JSON --output-file vfhe-sbom.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: vfhe-sbom.json

  publish-testpypi:
    name: Publish to TestPyPI (auto on tag)
    needs: [sdist, sbom]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/vfhe
    permissions:
      id-token: write
    steps:
      - name: Collect all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Stage distributions
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          ls -l dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI (manual) + GitHub Release
    needs: [sdist, sbom]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vfhe
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Collect all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Stage distributions
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          cp artifacts/sbom/vfhe-sbom.json .
          ls -l dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: Create GitHub Release with the artifacts + SBOM
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            dist/*
            vfhe-sbom.json
