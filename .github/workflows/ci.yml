# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Python + C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade "pip>=25.1"
      - run: pip install --group dev
      - run: make proto
      - name: ruff (lint + format check)
        run: |
          ruff check modules native scripts setup.py
          ruff format --check modules native scripts setup.py
      - name: pyright
        run: pyright
      - name: clang-format (Allman, pinned via dev deps)
        run: |
          find modules \( -name '*.c' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  test:
    name: Test ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install --upgrade "pip>=25.1"
      - run: pip install --group dev
      - name: Build the native extension (+ proto bindings)
        run: make build
      - name: C unit tests (Unity)
        run: python scripts/run_c_tests.py
      - name: Python tests (coverage in logs)
        run: pytest -q --cov=vfhe --cov-report=term-missing

  simd-compile:
    name: x86 AVX-512 compile-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: PYTHONPATH=scripts python scripts/check_simd_build.py

  package-smoke:
    name: Build sdist + wheel + import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install --upgrade "pip>=25.1" build twine
          python -m build
      - name: Check metadata
        run: twine check dist/*
      - name: Verify BLAKE3 sources shipped inside the sdist
        run: |
          tar tzf dist/*.tar.gz | grep -q 'external/blake3/c/blake3.c' \
            || { echo "::error::sdist is missing BLAKE3 sources"; exit 1; }
      - name: Install the built wheel and smoke-test it
        run: |
          python -m pip install dist/*.whl
          cd /tmp && python "$GITHUB_WORKSPACE/scripts/smoke_import.py"
      - uses: actions/upload-artifact@v7
        with:
          name: dist-smoke
          path: dist/*
