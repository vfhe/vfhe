# SPDX-License-Identifier: Apache-2.0
#
#   lint ───────────────────────────────────────────────────────────────┐
#   check-simd-build ───────────────────────────────────────────────────┤
#   fuzz-changed-code ──────────────────────────────────────────────────┼─→ ci-ok
#   test-sdist ─────────────────────────────────────────────────────────┤
#   test-c ─→ test-python ──────────────────────────────────────────────┘
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel stale PR runs; keep main's, they are the per-commit record.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (Python and C)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/setup-vfhe
        with:
          build: proto
      - name: Run ruff (lint and format check)
        run: |
          ruff check modules packaging scripts smoke .clusterfuzzlite .github setup.py
          ruff format --check modules packaging scripts smoke .clusterfuzzlite .github setup.py
      - name: Run pyright
        run: pyright
      - name: Run clang-format
        run: |
          find modules \( -name '*.c' -o -name '*.h' \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  # Object-only compile of the AVX-512 / AES-NI kernels; no other job compiles
  # them, and no runner can execute them. Nothing is built or kept: the compile
  # outcome is the check.
  check-simd-build:
    name: SIMD compile check (x86 AVX-512)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/setup-vfhe
        with:
          build: none
      # --require: fail instead of skip on hosts that cannot target x86.
      - name: Compile-check the SIMD kernels
        run: python scripts/check_simd_build.py --require

  # Fuzzes only the code this change touches (ClusterFuzzLite, own container;
  # needs no setup-vfhe). The long batch runs stay in cflite-batch.yml.
  fuzz-changed-code:
    name: Fuzz the changed code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: read-all
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - name: Build the fuzzers
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: c
      - name: Run the fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 180
          mode: code-change
          output-sarif: true

  # Test the C kernels before the Python wrappers that call them.
  # Compiles its own C: needs no extension build and no Python matrix.
  test-c:
    name: C tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/setup-vfhe
        with:
          build: none
      - name: Run the C unit tests
        run: python scripts/run_c_tests.py

  # One job for the whole suite: --complete runs the fast subset plus the
  # heavy @complete bootstraps.
  test-python:
    name: Python tests (${{ matrix.os }}, py${{ matrix.python }})
    needs: [test-c]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/setup-vfhe
        with:
          python-version: ${{ matrix.python }}
      - name: Run the complete Python tests
        run: pytest -q --complete

  test-sdist:
    name: Sdist build and install from source
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false
      - uses: ./.github/actions/setup-vfhe
        with:
          build: none
      - name: Build the sdist
        run: python -m build --sdist
      # --strict: treat warnings as errors; PyPI rejects them at upload.
      - name: Check the package metadata
        run: twine check --strict dist/*.tar.gz
      # Same checks as `make smoke`: scratch venv install, then smoke/*.py against it.
      # The install compiles every build input, so it also proves the sdist is complete.
      - name: Install the sdist into a clean venv (compiles)
        run: python scripts/check_install.py dist/*.tar.gz
      - name: Run the smoke tests against the install
        run: python scripts/run_smoke_tests.py --python .cache/install/venv/bin/python
      - name: Upload the sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 2 # reproducible on demand; no need to store longer

  # Point branch protection at this job alone; the job list below stays editable.
  ci-ok:
    name: CI OK
    # always(): report when a dependency fails, instead of hanging the required check.
    if: always()
    needs:
      [
        lint,
        check-simd-build,
        fuzz-changed-code,
        test-c,
        test-python,
        test-sdist,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Count skipped as failure: jobs after a failure are skipped, not failed.
      - name: Assert every CI job succeeded
        if: >-
          ${{ contains(needs.*.result, 'failure')
          || contains(needs.*.result, 'cancelled')
          || contains(needs.*.result, 'skipped') }}
        env:
          RESULTS: ${{ join(needs.*.result, ', ') }}
        run: |
          echo "::error::One or more CI jobs did not succeed: $RESULTS"
          exit 1
